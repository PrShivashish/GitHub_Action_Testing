name: Django CI pipeline #name of the pipeline
on: #trigger
  push:
    branches: #automatic trigger
      - main
  workflow_dispatch: #manual trigger

jobs:
  test: #name of the job
    runs-on: ubuntu-latest #runner machine
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 #download the code
      - name: setup python
        uses: actions/setup-python@v4 #install the python
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: |
          python manage.py migrate
      - name: run server check #run server and tests response
        run: |
          python manage.py check
